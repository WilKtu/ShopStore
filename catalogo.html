<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Css/Style-catalogo.css">
    <title>Catálogo - ShopStore</title>
</head>
<body>
    <!-- Barra de navegación -->
    <section id="nav">
        <button><a href="index.html">☰</a></button>
        <h1>ShopStore</h1>
        <button><a href="carritocompras.html">
            <img src="Img/carrito.png" alt="carrito de compras" width="30px">
        </a></button>
    </section>

    <section id="busqueda">
        <input type="text" placeholder="Buscar productos...">
        <button>Buscar</button>
    </section>

    <!-- Filtros de productos -->
    <section id="filters">
        <h2>Filtrar por:</h2>
        <button><a href="categoria-precio-popularidad.html#categoria">Categoría</a></button>
        <button><a href="categoria-precio-popularidad.html#precio">Precio</a></button>
        <button><a href="categoria-precio-popularidad.html#popularidad">Popularidad</a></button>
    </section>

    <!-- Catálogo de productos -->
    <section id="catalogo">
        <div class="product">
            <img src="Img/cam-cas.jpeg" alt="Producto 1">
            <h3>Camisa Casual</h3>
            <p>$19.99</p>
            <button>Agregar al carrito</button>
        </div>
        <div class="product">
            <img src="Img/ves-ele.jpeg" alt="Producto 2">
            <h3>Vestido Elegante</h3>
            <p>$29.99</p>
            <button>Agregar al carrito</button>
        </div>
        <div class="product">
            <img src="Img/pro2.jpeg" alt="Producto 3">
            <h3>Pantalón Deportivo</h3>
            <p>$24.99</p>
            <button>Agregar al carrito</button>
        </div>
    </section>

    <section id="cajadecontacto">
        <h2>¿No encuentras tu respuesta?</h2>
        <p>Contáctanos para cualquier consulta o asistencia.</p>
        <button id="info"><a href="pregunatas.html">Contactar soporte</a></button>
    </section>

    <!-- Pie de página -->
    <footer>
        <p>© 2026 ShopStore. Todos los derechos reservados.</p>
        <p><a href="contacto.html">Contacto</a> | <a href="politicas.html">Políticas</a></p>
    </footer>
</body>
</html>
