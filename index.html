<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Css/style.css">
    <title>ShopStore</title>
</head>
<body>
    
    <section id="nav">
        <button><a href="vacio.html">☰</a></button>
        <h1>ShopStore</h1>
        <button><a href="carrito.html">
            <img src="Img/carrito.png" alt="carrito de compras" width="30px">
        </a></button>
    </section>

    <section id="banner">
        <img src="Img/banner1.jpg" alt="Promoción 1">
        <img src="Img/banner2.jpg" alt="Promoción 2">
    </section>

    <section id="destacados">
        <h2>Productos Destacados</h2>
        <div class="product">
            <img src="Img/producto1.jpg" alt="Producto 1">
            <h3>Camisa Casual</h3>
            <p>$19.99</p>
            <button>Comprar ahora</button>
        </div>
        <div class="product">
            <img src="Img/producto2.jpg" alt="Producto 2">
            <h3>Vestido Elegante</h3>
            <p>$29.99</p>
            <button>Comprar ahora</button>
        </div>
    </section>


    <div class="cta">
        <a href="catalogo.html" class="btn">Explorar Catálogo</a>
        <a href="ofertas.html" class="btn">Ver Ofertas</a>
    </div>


    <section id="testimonios">
        <h2>Lo que dicen nuestros clientes</h2>
        <blockquote>
            <p>"Excelente calidad y precios increíbles. ¡Recomiendo ShopStore!"</p>
            <cite>- María López</cite>
        </blockquote>
    </section>


    <footer>
        <p>© 2026 ShopStore. Todos los derechos reservados.</p>
        <p><a href="contacto.html">Contacto</a> | <a href="politicas.html">Políticas</a></p>
    </footer>

    <script src="Js/script.js"></script>
</body>
</html>
